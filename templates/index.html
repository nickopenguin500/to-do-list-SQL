<!DOCTYPE html>
<html>
<head>
    <title>My Web To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .form-group { margin-bottom: 20px; }
        .controls { margin-bottom: 20px; padding: 15px; background-color: #f9f9f9; border: 1px solid #ddd; display: flex; gap: 20px; }
    </style>
</head>
<body>
    <h1>My To-Do List</h1>
    
    <div class="form-group">
        <form action="{{ url_for('add_task') }}" method="POST">
            <input type="text" name="task_name" placeholder="Enter a new task..." required>
            <label>Due:</label>
            <input type="date" name="due_date" required>
            <button type="submit">Add Task</button>
        </form>
    </div>

    <div class="controls">
        <form action="{{ url_for('index') }}" method="GET" id="controlForm">
            <label for="filter"><strong>Filter:</strong></label>
            <select name="filter" id="filter" onchange="document.getElementById('controlForm').submit()">
                <option value="All" {% if current_filter == 'All' %}selected{% endif %}>Show All Tasks</option>
                <option value="Pending" {% if current_filter == 'Pending' %}selected{% endif %}>Pending Only</option>
                <option value="Completed" {% if current_filter == 'Completed' %}selected{% endif %}>Completed Only</option>
            </select>

            <label for="sort" style="margin-left: 20px;"><strong>Sort By:</strong></label>
            <select name="sort" id="sort" onchange="document.getElementById('controlForm').submit()">
                <option value="due_asc" {% if current_sort == 'due_asc' %}selected{% endif %}>Due Date (Earliest - Latest)</option>
                <option value="due_desc" {% if current_sort == 'due_desc' %}selected{% endif %}>Due Date (Latest - Earliest)</option>
                <option value="alpha" {% if current_sort == 'alpha' %}selected{% endif %}>Alphabetical (A - Z)</option>
                <option value="comp_asc" {% if current_sort == 'comp_asc' %}selected{% endif %}>Date Completed (Earliest - Latest)</option>
                <option value="comp_desc" {% if current_sort == 'comp_desc' %}selected{% endif %}>Date Completed (Latest - Earliest)</option>
            </select>
        </form>
    </div>

    <table>
        <tr>
            <th>Task</th>
            <th>Status</th>
            <th>Due Date</th>
            <th>Date Completed</th>
            <th>Actions</th>
        </tr>
        {% for task in tasks %}
        <tr>
            <td>{{ task['task'] }}</td>
            <td>{{ task['status'] }}</td>
            <td>{{ task['due_date'] }}</td>
            <td>{{ task['date_completed'] if task['date_completed'] else '-' }}</td>
            <td>
                <form action="{{ url_for('update_task', id=task['id']) }}" method="POST" style="display:inline;">
                    <select name="status">
                        <option value="Pending" {% if task['status'] == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Completed" {% if task['status'] == 'Completed' %}selected{% endif %}>Completed</option>
                    </select>
                    <button type="submit">Update</button>
                </form>

                <form action="{{ url_for('delete_task', id=task['id']) }}" method="POST" style="display:inline;">
                    <button type="submit" onclick="return confirm('Are you sure you want to delete this task?');">Delete</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="5">No tasks found. Get to work!</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
